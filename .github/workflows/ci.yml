name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check src scripts tests

      - name: Black
        run: black --check src scripts tests

      - name: Mypy
        run: mypy src scripts tests

  unit-tests:
    name: Unit Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install unit test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install numpy opencv-python Pillow PyMuPDF flask tqdm

      - name: Run pytest with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml tests

      - name: Upload coverage XML
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-tests-torch:
    name: Backend Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        backend: ["template", "cnn", "embed"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Cache torch weights
        uses: actions/cache@v5
        with:
          path: ~/.cache/torch
          key: ${{ runner.os }}-torch-${{ matrix.backend }}-${{ hashFiles('requirements-dev.txt', 'pyproject.toml') }}

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install numpy opencv-python Pillow PyMuPDF flask tqdm
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Run backend-specific smoke tests
        run: |
          case "${{ matrix.backend }}" in
            template)
              pytest -q tests/test_shape_classifier_backends.py -k "template_backend"
              ;;
            cnn)
              pytest -q tests/test_shape_classifier_backends.py -k "cnn_backend"
              ;;
            embed)
              pytest -q tests/test_shape_classifier_backends.py -k "embed_backend"
              ;;
          esac

  integration:
    name: Integration + Review UI Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Cache Paddle models
        uses: actions/cache@v5
        with:
          path: ~/.paddlex
          key: ${{ runner.os }}-paddlex-${{ hashFiles('requirements.txt') }}

      - name: Install integration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run full pipeline on sample PDF
        run: >
          python scripts/run_pipeline.py
          --pdf "data/鋼筋施工圖料單明細表單.pdf"
          --out output/result_ci.json
          --debug
          --shape-classifier template

      - name: Debug - Pipeline output
        if: always()
        run: |
          echo "=== Pipeline exit status: $?"
          echo "=== Checking for result JSON ==="
          ls -la output/ 2>/dev/null || echo "output/ not found"
          echo "=== Checking for debug directory ==="
          ls -laR output/debug/ 2>/dev/null || echo "output/debug/ not found"
          echo "=== Checking for review_assets directory ==="
          ls -laR output/review_assets/ 2>/dev/null || echo "output/review_assets/ not found"

      - name: Validate pipeline artifacts and review API
        run: >
          python scripts/ci_smoke.py
          --result output/result_ci.json
          --check-review-api

      - name: Debug - List output directory
        if: always()
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Output directory contents ==="
          ls -laR output/ || echo "output/ directory not found"
          echo "=== Checking for result_ci.json ==="
          file output/result_ci.json || echo "result_ci.json not found"
          echo "=== Checking for debug directory ==="
          ls -la output/debug/ || echo "output/debug/ directory not found"
          echo "=== Checking for review_assets directory ==="
          ls -la output/review_assets/ || echo "output/review_assets/ directory not found"

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-artifacts
          path: output/
          if-no-files-found: warn
